const tabEl = document.getElementById('tabs');
const menuEl = document.getElementById('menuList');
const modalOverlay = document.getElementById('modalOverlay');
const modalProductImg = document.getElementById('modalProductImg');
const modalProductName = document.getElementById('modalProductName');
const modalProductDesc = document.getElementById('modalProductDesc');
const modalPrice = document.getElementById('modalPrice');

let activeIdx = 0;
let scrollTimeout = null;
let isClickScrolling = false;

function tagHtml(tags) {
  if (!tags || !tags.length) return '';
  return '<div style="margin-bottom:4px">' + tags.map(t =>
    t==='hot' ? '<span class="tag tag-hot">热销</span>' :
    t==='new' ? '<span class="tag tag-new">新品</span>' :
    t==='limited' ? '<span class="tag tag-limited">限定</span>' : ''
  ).join('') + '</div>';
}

function getTagLabel(tags) {
  if (!tags || !tags.length) return '';
  if (tags.includes('limited')) return '【限定】';
  if (tags.includes('new')) return '【新品】';
  if (tags.includes('hot')) return '【热销】';
  return '';
}

function openModal(item) {
  modalProductImg.innerHTML = item.img ? '<img src="' + item.img + '" style="width:100%;height:100%;object-fit:cover;">' : '<span style="font-size:90px">' + item.icon + '</span>';
  modalProductName.textContent = item.name;
  const tagLabel = getTagLabel(item.tags);
  modalProductDesc.innerHTML = (tagLabel ? '<span class="modal-desc-label">' + tagLabel + '</span> ' : '') + item.desc;
  modalPrice.innerHTML = '<span>¥</span>' + item.price;
  modalOverlay.classList.add('active');
}

function closeModal() {
  modalOverlay.classList.remove('active');
}

function updateActiveTab(idx) {
  activeIdx = idx;
  document.querySelectorAll('.tab-item').forEach((el, i) => {
    el.classList.toggle('active', i === activeIdx);
  });
  const activeTab = document.querySelector('.tab-item.active');
  if (activeTab) {
    activeTab.scrollIntoView({ block: 'nearest' });
  }
}

function renderTabs() {
  tabEl.innerHTML = '';
  categories.forEach((cat, i) => {
    const el = document.createElement('div');
    el.className = 'tab-item' + (i === activeIdx ? ' active' : '');
    el.textContent = cat.label;
    el.dataset.idx = i;
    el.onclick = () => {
      const idx = parseInt(el.dataset.idx);
      updateActiveTab(idx);
      isClickScrolling = true;
      const targetSection = document.getElementById('sec-' + cat.id);
      if (targetSection) {
        targetSection.scrollIntoView({ behavior: 'instant' });
      }
      setTimeout(() => {
        isClickScrolling = false;
      }, 500);
    };
    tabEl.appendChild(el);
  });
}

function renderMenu() {
  menuEl.innerHTML = '';
  categories.forEach(cat => {
    const sec = document.createElement('div');
    sec.id = 'sec-' + cat.id;
    const ttl = document.createElement('div');
    ttl.className = 'category-title';
    ttl.dataset.catId = cat.id;
    ttl.innerHTML = cat.label + ' <span class="category-count">(' + cat.items.length + ')</span>';
    sec.appendChild(ttl);
    cat.items.forEach((item) => {
      const d = document.createElement('div');
      d.className = 'item-card';
      d.innerHTML = '<div class="item-img">' + (item.img ? '<img src="' + item.img + '">' : item.icon) + '</div><div class="item-info"><div class="item-name">' + item.name + '</div>' + tagHtml(item.tags) + '<div class="item-desc">' + item.desc + '</div><div class="item-price"><span>¥</span>' + item.price + '</div></div>';
      d.onclick = () => openModal(item);
      sec.appendChild(d);
    });
    menuEl.appendChild(sec);
  });
}

function checkStickyTab() {
  const titles = document.querySelectorAll('.category-title');
  const menuRect = menuEl.getBoundingClientRect();
  
  let actualTopTitle = null;
  let closestToZero = -Infinity;
  
  titles.forEach((title) => {
    const rect = title.getBoundingClientRect();
    const relativeTop = rect.top - menuRect.top;
    if (relativeTop <= 0 && rect.bottom > 0) {
      if (relativeTop > closestToZero) {
        closestToZero = relativeTop;
        actualTopTitle = title;
      }
    }
  });
  
  if (actualTopTitle) {
    const catId = actualTopTitle.dataset.catId;
    const idx = categories.findIndex(c => c.id === catId);
    if (idx !== -1 && idx !== activeIdx) {
      updateActiveTab(idx);
    }
  }
}

menuEl.addEventListener('scroll', () => {
  if (isClickScrolling) return;
  if (scrollTimeout) clearTimeout(scrollTimeout);
  scrollTimeout = setTimeout(checkStickyTab, 50);
}, { passive: true });

document.getElementById('modalClose').onclick = closeModal;
modalOverlay.onclick = (e) => {
  if (e.target === modalOverlay) closeModal();
};

renderTabs();
renderMenu();
setTimeout(checkStickyTab, 100);
</script>
